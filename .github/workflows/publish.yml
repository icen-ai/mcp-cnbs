name: Publish to npm

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Extract version from tag
        id: extract_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: |
          jq ".version = \"${{ steps.extract_version.outputs.VERSION }}\"" package.json > package.json.tmp && mv package.json.tmp package.json

      - name: Publish to npm (unscoped mcp-cnbs)
        run: |
          npm config delete //registry.npmjs.org/:_authToken || true  # ← 删掉空 token
          npm publish --access public --provenance