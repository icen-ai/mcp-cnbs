name: Publish to npm

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'  # 匹配 x.x.x 格式的标签

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # 必需：用于 OIDC 身份验证
      contents: read   # 必需：用于读取代码
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Extract version from tag
        id: extract_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: |
          jq ".version = \"${{ steps.extract_version.outputs.VERSION }}\"" package.json > package.json.tmp && mv package.json.tmp package.json
          echo "Updated package.json version to ${{ steps.extract_version.outputs.VERSION }}"

      - name: Publish to npm (scoped)
        run: |
          sed -i 's/"name": "mcp-cnbs"/"name": "@icen.ai\/mcp-cnbs"/g' package.json
          npm publish --access public --provenance

      - name: Publish to npm (unscoped)
        run: |
          sed -i 's/"name": "@icen.ai\/mcp-cnbs"/"name": "mcp-cnbs"/g' package.json
          npm publish --access public --provenance